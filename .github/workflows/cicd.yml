name: Kubernetes CI/CD

on:
  push:
    branches: [ main ]

env:
  # Using the DOCKERHUB_USERNAME secret keeps your workflow reusable
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/flask-k8s-app
  # This suppresses the Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build and push Docker image
        run: |
          # The '.' assumes your Dockerfile is in the root directory
          docker build -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kube.yaml
      - name: Update Kubernetes Deployment
        run: |
          # This command targets the existing deployment you manually created
          kubectl set image deployment/flask-app flask=$IMAGE:${{ github.sha }} --kubeconfig=kube.yaml
          # This waits for the pods to be 'Ready' before marking the job as successful
          kubectl rollout status deployment/flask-app --kubeconfig=kube.yaml
