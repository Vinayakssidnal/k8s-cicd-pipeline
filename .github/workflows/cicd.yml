name: Kubernetes CI/CD

on:
  push:
    branches: [ main ]

env:
  # Using the DOCKERHUB_USERNAME secret keeps your workflow reusable
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/flask-k8s-app
  # This suppresses the Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run unit tests
        run: |
          pytest

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure kubeconfig
        run: |
          # This decodes the FLATTENED Kubeconfig you stored in Secrets
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kube.yaml
      - name: Deploy to Cluster
        run: |
          # Updates the image of the container named 'flask' in the 'flask-app' deployment
          kubectl set image deployment/flask-app flask=${{ env.IMAGE }}:${{ github.sha }} --kubeconfig=kube.yaml
          # Waits for the rollout to complete successfully
          kubectl rollout status deployment/flask-app --kubeconfig=kube.yaml
